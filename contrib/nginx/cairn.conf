# Cairn labeler — nginx reverse-proxy + TLS-termination template.
#
# Replace `labeler.example.com` with your hostname. Provision a
# certificate (e.g. via certbot) and drop its path into the
# ssl_certificate / ssl_certificate_key lines below. Drop this
# file at /etc/nginx/sites-available/cairn.conf and symlink into
# /etc/nginx/sites-enabled/:
#
#   sudo ln -s /etc/nginx/sites-available/cairn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cairn's default bind is 127.0.0.1:3000 (§F13 "expects reverse proxy
# for TLS"). Adjust the upstream target below if your cairn.toml sets
# a different bind_addr.

# ---------------------------------------------------------------------
# WebSocket connection-upgrade map (needed explicitly in nginx).
# Contrast with the Caddyfile in this directory, which handles
# WebSocket upgrade transparently inside `reverse_proxy` and needs
# no equivalent directive.
# ---------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

# ---------------------------------------------------------------------
# §F13 traffic limits.
#
# Connection caps (`limit_conn_*`) are version-stable across nginx
# 1.18+ and ship active by default below for subscribeLabels (per-IP
# 8 concurrent).
#
# Rate limits (`limit_req_*`) are operator-add. The §F13 numbers
# include "createReport: per-IP burst 3, rate 10/hour", but the
# `r/h` rate unit landed in nginx 1.27.x and Cairn's CI smoke
# (Ubuntu LTS nginx, 1.24-ish) can't parse it. Pinning to a specific
# newer version would versions-out other operator environments, so
# Cairn's reference deployment ships without rate-limiting in this
# file; rate values are operator-specific anyway (depends on
# expected traffic, abuse posture, available upstream capacity).
#
# To add createReport rate-limiting, declare a zone here in the
# http {} surface and reference it inside the relevant location
# block:
#
#   limit_req_zone $binary_remote_addr zone=cairn_report:10m rate=60r/m;
#
#   server {
#       location = /xrpc/com.atproto.moderation.createReport {
#           limit_req zone=cairn_report burst=3 nodelay;
#           proxy_pass http://cairn_backend;
#       }
#   }
#
# `60r/m` matches §F13's "10 per hour" target while staying within
# rate units that all supported nginx versions accept (use `r/h`
# directly if your nginx is 1.27+). Tune `burst` and the rate value
# based on real traffic.
#
# A 10m zone holds ~160k unique client IPs — ample for any
# reasonable labeler. Adjust upward if you expect a larger
# client-IP base (the nginx docs recommend 1m per 16k IPs).
# ---------------------------------------------------------------------
limit_conn_zone $binary_remote_addr zone=cairn_subscribe:10m;

upstream cairn_backend {
	server 127.0.0.1:3000;
	keepalive 32;
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name labeler.example.com;

	# Replace with your certbot-provisioned paths.
	ssl_certificate     /etc/letsencrypt/live/labeler.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/labeler.example.com/privkey.pem;

	# Modern TLS posture.
	ssl_protocols             TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers off;

	# HSTS — §F13.
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	# Shared proxy headers.
	proxy_http_version 1.1;
	proxy_set_header   Host              $host;
	proxy_set_header   X-Real-IP         $remote_addr;
	proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header   X-Forwarded-Proto $scheme;

	# -----------------------------------------------------------------
	# createReport (§F11). Falls through to the catch-all `/`
	# location below for proxy_pass. To add rate-limiting at this
	# endpoint, see the operator-add example near the
	# `limit_conn_zone` directive at the top of this file.
	# -----------------------------------------------------------------

	# -----------------------------------------------------------------
	# subscribeLabels (§F4) — WebSocket. Per-IP 8 concurrent.
	# The Upgrade + Connection headers are load-bearing; without
	# them nginx sends the WS handshake as a regular HTTP/1.1
	# request and the connection fails after upgrade.
	# -----------------------------------------------------------------
	location = /xrpc/com.atproto.label.subscribeLabels {
		limit_conn cairn_subscribe 8;
		proxy_pass         http://cairn_backend;
		proxy_set_header   Upgrade    $http_upgrade;
		proxy_set_header   Connection $connection_upgrade;
		proxy_read_timeout 1h;  # WebSocket idle tolerance
	}

	# -----------------------------------------------------------------
	# Admin endpoints — §F13 no-cache headers. Admin responses
	# reflect mutable moderation state (label lists, report state,
	# audit log); an intermediary cache could produce stale views
	# that affect moderation decisions.
	# -----------------------------------------------------------------
	location /xrpc/tools.cairn.admin. {
		add_header Cache-Control "no-store, max-age=0" always;
		add_header Pragma        "no-cache"            always;
		proxy_pass http://cairn_backend;
	}

	# -----------------------------------------------------------------
	# /.well-known/lexicons/* (#18) + /.well-known/did.json (L3).
	# Public, CORS-open, no auth required. Straight passthrough.
	# -----------------------------------------------------------------
	location /.well-known/ {
		proxy_pass http://cairn_backend;
	}

	# -----------------------------------------------------------------
	# Catch-all for the remaining /xrpc/* surface (queryLabels,
	# admin non-prefix variants, future endpoints).
	# -----------------------------------------------------------------
	location / {
		proxy_pass http://cairn_backend;
	}

	access_log /var/log/nginx/cairn.access.log;
	error_log  /var/log/nginx/cairn.error.log  warn;
}

# ---------------------------------------------------------------------
# Optional HTTP -> HTTPS redirect. Enable if nginx is the public
# entry point on port 80.
# ---------------------------------------------------------------------
server {
	listen      80;
	listen      [::]:80;
	server_name labeler.example.com;
	return 301 https://$host$request_uri;
}
