name: CI

on:
  push:
    branches: [main]
  pull_request:

# OS matrix is Ubuntu-only by design. Cairn's §5.1 credential file
# invariants (mode 0o600 + owner-UID match via rustix::process::geteuid)
# and §5.3 session-file handling require POSIX semantics. Testing on
# macOS is feasible but buys nothing given the tests exercise the same
# Unix syscalls; Windows would require gating large swaths of tests
# behind #[cfg(unix)] with dedicated mock paths we don't have.

env:
  CARGO_TERM_COLOR: always
  # All sqlx query macros resolve against the committed `.sqlx/` cache.
  # Regenerate with `cargo sqlx prepare` after schema or query changes.
  # Drift surfaces as a compile error in clippy + test jobs (explicit
  # `cargo sqlx prepare --check` would add a friendlier error message
  # but no safety — the implicit enforcement is sufficient).
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets --all-features

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      # Promotes rustdoc warnings (missing_docs, broken intra-doc
      # links, bare URLs) to errors. Coverage + cleanliness were
      # closed out in #11 / 3c34a7a; this gate prevents regression.
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  msrv:
    # MSRV (minimum supported Rust version) matches Cargo.toml's
    # `rust-version = "1.88"`. Only build + test run on MSRV —
    # clippy and fmt are intentionally absent because their lint
    # set churns across Rust versions and pinning them to 1.88
    # would flag legitimate stable-only lints as MSRV failures.
    # Coverage split: stable enforces lints (fmt + clippy + doc),
    # MSRV enforces "does it still compile and pass tests here."
    name: test-msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets --all-features
      - run: cargo test --all-targets --all-features

  deny:
    # cargo-deny: advisories + licenses + bans + sources. Config in
    # deny.toml at repo root; see §F15 for the policy. Runs alongside
    # cargo-audit — the two overlap on advisories but cargo-deny
    # respects feature-gated deps and adds licenses / bans / sources
    # coverage. The version is pinned to the one documented in
    # CONTRIBUTING.md's Security scanning tools section; bump both
    # together.
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny --version 0.19.4
      - run: cargo deny check

  audit:
    # cargo-audit: scan Cargo.lock for known advisories. Hard-fail:
    # any advisory that isn't explicitly ignored blocks merge.
    # --deny warnings promotes unsound/unmaintained/yanked advisories
    # to errors too, so the same threshold applies across severity
    # bands. The version is pinned to the one documented in
    # CONTRIBUTING.md's Security scanning tools section; bump both
    # together.
    #
    # Ignored advisories are passed via --ignore and MUST mirror the
    # [[advisories.ignore]] list in deny.toml. The rationale for each
    # ignore lives in deny.toml (one source of truth); this list is
    # the IDs only. Audits of the ignore list happen against the
    # deny.toml comments.
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit --version 0.22.1
      - run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071

  e2e-quickstart:
    # Walks the README's operator workflow end-to-end against a
    # mock PDS — catches silent README drift (config field renames,
    # CLI surface regressions, /.well-known/did.json shape breaks).
    # Script lives at tests/e2e/quickstart.sh; mock PDS binary at
    # examples/mock_pds.rs. See #10 for the chartered scope and
    # the rpassword-no-TTY workaround.
    name: e2e quickstart rot-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: tests/e2e/quickstart.sh

  contrib-smoke:
    # Syntactic validation of contrib/ deployment templates (#9).
    # Catches the common rot mode: an operator-edited template
    # ships with a broken directive that would only surface at
    # production reload time. The chartered scope is syntactic; an
    # end-to-end docker-compose runthrough (TLS handshake, header
    # forwarding, IP propagation) tracks separately as a v1.2+
    # follow-up — see chainlink #32.
    name: contrib syntax smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: systemd-analyze verify (cairn.service)
        # Install a stub binary at the path the unit's ExecStart=
        # line references so systemd-analyze doesn't fail on the
        # absent-executable check (it would otherwise reject the
        # unit on a fresh runner that has no cairn build yet).
        run: |
          sudo install -m 0755 /bin/true /usr/local/bin/cairn
          sudo install -dm 0750 /etc/cairn
          sudo touch /etc/cairn/cairn.toml
          sudo systemd-analyze verify contrib/systemd/cairn.service
      - name: install caddy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
            | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
            | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update -y
          sudo apt-get install -y caddy
      - name: caddy validate (Caddyfile)
        run: caddy validate --config contrib/caddy/Caddyfile --adapter caddyfile
      - name: install nginx
        run: sudo apt-get install -y nginx
      - name: nginx -t (cairn.conf — wrapped because it's an http-block snippet)
        # contrib/nginx/cairn.conf is a snippet meant to be
        # `include`d inside an http {} block (it declares `map`,
        # `upstream`, and `server` directives but no
        # events/http wrappers). nginx -t requires a complete
        # config, so wrap the snippet in the minimum viable shell
        # before validating. The wrapper is throw-away; only the
        # snippet's syntax is the unit-of-rot here.
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          mkdir -p "$tmp/conf.d"
          cp contrib/nginx/cairn.conf "$tmp/conf.d/cairn.conf"
          cat > "$tmp/nginx.conf" <<'WRAPPER'
          # Auto-generated wrapper; only the included snippet is the unit
          # under test. Required because cairn.conf declares http-block
          # directives without the events/http top-level shell.
          worker_processes 1;
          pid /tmp/nginx-validate.pid;
          error_log /tmp/nginx-validate.error.log;
          events {}
          http {
            access_log /tmp/nginx-validate.access.log;
            client_body_temp_path /tmp/nginx-client-body;
            proxy_temp_path /tmp/nginx-proxy;
            fastcgi_temp_path /tmp/nginx-fastcgi;
            uwsgi_temp_path /tmp/nginx-uwsgi;
            scgi_temp_path /tmp/nginx-scgi;
            include CONF_DIR/conf.d/*.conf;
          }
          WRAPPER
          sed -i "s|CONF_DIR|$tmp|g" "$tmp/nginx.conf"
          # The snippet's TLS lines reference cert paths that don't
          # exist on the runner. nginx -t resolves them at parse time
          # and would fail. Stub with self-signed throwaways.
          sudo openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout /etc/ssl/private/cairn-validate.key \
            -out /etc/ssl/certs/cairn-validate.crt \
            -subj "/CN=labeler.example.com" 2>/dev/null
          sed -i \
            -e 's|/etc/ssl/certs/labeler.example.com.crt|/etc/ssl/certs/cairn-validate.crt|g' \
            -e 's|/etc/ssl/private/labeler.example.com.key|/etc/ssl/private/cairn-validate.key|g' \
            "$tmp/conf.d/cairn.conf"
          nginx -t -c "$tmp/nginx.conf" -p "$tmp"
