name: Release

# Manual release workflow. One job bumps the crate version, migrates
# the CHANGELOG, tags, publishes to crates.io, and creates a GitHub
# Release; a separate non-blocking smoke job then verifies the
# published artifact installs cleanly from crates.io (§F13).
#
# ─── Operational prereqs (required before running this workflow) ───
#
# 1. CARGO_REGISTRY_TOKEN secret set in repo Actions secrets.
#    Scope it via crates.io's scoped-token feature to:
#      * endpoint:   publish-new + publish-update
#      * crate:      cairn-mod only
#      * expiry:     prefer 90-day rotation
#    Generate at https://crates.io/me; pick "Scoped API Tokens".
#    A scoped token limits blast radius if it leaks.
#
# 2. Crate name `cairn-mod` reserved / owned on crates.io. First
#    publish implicitly reserves; subsequent publishes require the
#    token owner to be a crate owner.
#
# 3. Branch protection on `main` must permit github-actions[bot]
#    to push the release commit + tag. If "Require a pull request"
#    is enabled, add a bypass for the Actions bot or temporarily
#    lift protection for the release run.
#
# 4. Production Checklist dry-run per §14.1 of cairn-design.md is
#    a soft human gate — confirmed mentally before triggering.
#
# ─── Failure-mode recovery ───
#
# Pre-publish steps are reversible (no side effects outside the
# runner). Publish + tag + GitHub Release are the irreversible
# zone; the workflow orders these to fail as early as possible
# (dry-run before commit, tag just before publish).
#
# If cargo publish FAILS after commit+tag were pushed:
#   git push --delete origin vX.Y.Z   # remove remote tag
#   git tag -d vX.Y.Z                 # remove local tag
#   git revert <release-commit-sha>   # undo the version bump
#   git push origin main              # propagate the revert
# Then diagnose (auth? packaging? network?) and re-run. crates.io
# accepts a re-publish of the same version only if the prior
# attempt never completed; if it partially published, yank and
# pick a new version.
#
# If cargo publish SUCCEEDED but GitHub Release creation failed:
#   crates.io is canonical; no code cleanup needed. Run:
#     gh release create vX.Y.Z --title "vX.Y.Z" \
#       --notes-file <(sed -n '/## \[X.Y.Z\]/,/## \[/p' CHANGELOG.md)
#   manually from any checkout of the release tag.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact semver to release (e.g. 1.0.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  # sqlx query macros resolve against the committed `.sqlx/` cache.
  SQLX_OFFLINE: "true"

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit + tag push + GitHub Release create
    steps:
      - name: Validate semver input
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${{ inputs.version }}' is not X.Y.Z semver"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check main CI is green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(gh run list --branch main --workflow CI --limit 1 \
            --json conclusion --jq '.[0].conclusion')
          if [[ "$status" != "success" ]]; then
            echo "::error::Latest CI run on main is '$status', not 'success'"
            exit 1
          fi

      - name: Verify clean working tree
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Working tree is not clean at checkout"
            git status
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit (set-version only)
        run: cargo install cargo-edit --locked --no-default-features --features set-version

      - name: Bump Cargo.toml + sync Cargo.lock
        run: |
          cargo set-version "${{ inputs.version }}"
          # Ensure Cargo.lock reflects the new version before publish.
          cargo check --all-features

      - name: Migrate CHANGELOG.md
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import os
          from datetime import date
          from pathlib import Path
          version = os.environ["VERSION"]
          today = date.today().isoformat()
          src = Path("CHANGELOG.md").read_text()
          if "## [Unreleased]" not in src:
              raise SystemExit("CHANGELOG.md missing '## [Unreleased]' header")
          stub = (
              "## [Unreleased]\n\n"
              "### Added\n\n"
              "### Changed\n\n"
              "### Fixed\n\n"
              "### Removed\n\n"
              "### Security\n\n"
          )
          src = src.replace(
              "## [Unreleased]",
              f"{stub}## [{version}] - {today}",
              1,
          )
          Path("CHANGELOG.md").write_text(src)
          PY

      - name: Cargo publish dry-run (pre-commit gate)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run --locked

      - name: Commit version bump + CHANGELOG migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "release: v${{ inputs.version }}"

      - name: Tag release
        run: git tag "v${{ inputs.version }}"

      - name: Push commit + tag
        run: git push origin main --follow-tags

      - name: Cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          version = os.environ["VERSION"]
          lines = Path("CHANGELOG.md").read_text().splitlines()
          start = end = None
          for i, line in enumerate(lines):
              if line.startswith(f"## [{version}]"):
                  start = i
              elif start is not None and line.startswith("## [") and i > start:
                  end = i
                  break
          if start is None:
              raise SystemExit(f"CHANGELOG section for [{version}] not found")
          end = end if end is not None else len(lines)
          body = "\n".join(lines[start + 1 : end]).strip()
          Path("release-notes.md").write_text(body + "\n")
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes-file release-notes.md

  smoke:
    # Non-blocking post-publish verification of §F13:
    # "cargo install cairn-mod produces a working binary named cairn".
    # continue-on-error so crates.io index propagation lag cannot
    # mark the release as failed after it has successfully published.
    name: post-publish smoke
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: dtolnay/rust-toolchain@stable

      - name: Wait for crates.io sparse-index propagation
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Sparse index updates faster than `cargo search`. Path scheme:
          # 4+-char names live at <first-2>/<chars-3-4>/<name>. For
          # `cairn-mod`: ca/ir/cairn-mod.
          for i in $(seq 1 30); do
            if curl -fsS "https://index.crates.io/ca/ir/cairn-mod" \
              | grep -q "\"vers\":\"${VERSION}\""; then
              echo "Version ${VERSION} visible on crates.io sparse index"
              exit 0
            fi
            echo "Not yet visible, sleeping 10s (${i}/30)..."
            sleep 10
          done
          echo "::warning::Version ${VERSION} not visible after 5min; skipping install verification"
          exit 0

      - name: Install from crates.io + invoke binary
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cargo install cairn-mod --version "${VERSION}" --locked
          cairn --version
